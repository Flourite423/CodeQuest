              $ref: '#/components/schemas/AdminSystemConfigUpdateInput'
      responses:
        '200':
          description: Admin system config updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    page:
      name: page
      in: query
      description: 1-based page index
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    page_size:
      name: page_size
      in: query
      description: Requested page size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    sort_by:
      name: sort_by
      in: query
      description: Lower snake case sort field name
      required: false
      schema:
        type: string
        default: created_at
    sort_order:
      name: sort_order
      in: query
      description: Sort order enum in lower snake case
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    keyword:
      name: keyword
      in: query
      description: Fuzzy search keyword
      required: false
      schema:
        type: string
    status:
      name: status
      in: query
      description: Status filter
      required: false
      schema:
        type: string
    date_from:
      name: date_from
      in: query
      description: Date range start (inclusive)
      required: false
      schema:
        type: string
        format: date
    date_to:
      name: date_to
      in: query
      description: Date range end (inclusive)
      required: false
      schema:
        type: string
        format: date
  responses:
    Ok:
      description: Successful request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    BadRequest:
      description: Invalid request parameters or payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid authentication credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but missing required permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource conflict (e.g., duplicate email)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    SuccessEnvelope:
      type: object
      description: Shared success response wrapper for v1 endpoints
      x-audience: shared
      x-permission: shared.response.read
      x-idempotent: true
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: true
          description: Endpoint-specific payload
        meta:
          type: object
          required:
            - request_id
            - server_time
          properties:
            request_id:
              type: string
              format: uuid
              description: UUID request identifier for tracing
            server_time:
              type: string
              format: date-time
              description: UTC RFC3339 timestamp
            page:
              type: integer
              description: Current page number (for list responses)
            page_size:
              type: integer
              description: Items per page (for list responses)
            total:
              type: integer
              description: Total number of items (for list responses)
            has_more:
              type: boolean
              description: Whether more items are available (for list responses)
    ErrorEnvelope:
      type: object
      description: Shared error response wrapper for v1 endpoints
      x-audience: shared
      x-permission: shared.response.read
      x-idempotent: true
      required:
        - error
        - meta
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Stable lower_snake_case error code
            message:
              type: string
              description: Human-readable error summary
            field_errors:
              type: array
              items:
                type: object
                required:
                  - field
                  - code
                  - message
                properties:
                  field:
                    type: string
                  code:
                    type: string
                  message:
                    type: string
              description: Per-field validation errors
            details:
              type: object
              additionalProperties: true
              description: Optional structured debug details
            retryable:
              type: boolean
              description: Whether the request can be retried
        meta:
          type: object
          required:
            - request_id
            - server_time
          properties:
            request_id:
              type: string
              format: uuid
              description: UUID request identifier for tracing
            server_time:
              type: string
              format: date-time
              description: UTC RFC3339 timestamp
    Course:
      type: object
      description: >-
        Canonical course entity schema. Admin may view draft, published, and archived records; learner-facing DTOs must only project published content.
      x-audience: admin
      x-permission: admin.course.read
      x-idempotent: true
      required:
        - id
        - course_code
        - title
        - summary
        - difficulty
        - estimated_minutes
        - status
        - sort_order
        - content_version
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        course_code:
          type: string
          description: Stable business code for course identity
        title:
          type: string
          minLength: 1
          maxLength: 100
        summary:
          type: string
          maxLength: 300
        description:
          type: string
          nullable: true
        cover_image_url:
          type: string
          format: uri
          nullable: true
        difficulty:
          type: string
          enum:
            - beginner
            - intermediate
        estimated_minutes:
          type: integer
          minimum: 0
        status:
          type: string
          description: Course state machine is draft -> published -> archived
          enum:
            - draft
            - published
            - archived
        sort_order:
          type: integer
        content_version:
          type: integer
          minimum: 1
          description: Monotonic content version for compatibility-safe content updates
        created_by:
          type: string
          format: uuid
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CourseProgress:
      type: object
      description: Learner course progress tracking
      x-audience: learner
      x-permission: learner.progress.read
      x-idempotent: true
      required:
        - id
        - learner_id
        - course_id
        - completed_chapter_count
        - total_chapter_count
        - completed_exercise_count
        - progress_percent
        - status
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Progress record ID
        learner_id:
          type: string
          format: uuid
          description: Learner account ID
        course_id:
          type: string
          format: uuid
          description: Course ID
        completed_chapter_count:
          type: integer
          description: Number of completed chapters
        total_chapter_count:
          type: integer
          description: Total number of chapters
        completed_exercise_count:
          type: integer
          description: Number of completed exercises
        progress_percent:
          type: integer
          minimum: 0
          maximum: 100
          description: Progress percentage 0..100
        last_studied_chapter_id:
          type: string
          format: uuid
          nullable: true
          description: Most recently studied chapter
        status:
          type: string
          description: Progress status
          enum:
            - not_started
            - in_progress
            - completed
        started_at:
          type: string
          format: date-time
          nullable: true
          description: When the learner started the course
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When the learner completed the course
        updated_at:
          type: string
          format: date-time
          description: Last update time
    Chapter:
      type: object
      description: >-
        Canonical chapter entity schema. Learner-facing DTOs must only expose published chapters from published courses.
      x-audience: admin
      x-permission: admin.course.read
      x-idempotent: true
      required:
