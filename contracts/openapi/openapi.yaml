openapi: 3.0.3
info:
  title: 前端学习APP API
  version: 1.0.0
  description: >-
    三端共享的 OpenAPI 单一真源骨架。统一服务于后端 API、学习者移动端与运营管理后台。
    所有正式接口统一挂载在 /api/v1 下，新增字段只允许向后兼容追加；删除字段、重定义语义或破坏既有枚举含义只能在 v2 进行。
servers:
  - url: /api/v1
    description: Stable v1 base path
tags:
  - name: auth
    description: Shared authentication and session workflows
  - name: learner-account
    description: Learner account lifecycle capabilities
  - name: learner-course
    description: Learner course discovery and enrollment capabilities
  - name: learner-practice
    description: Learner practice task workflows
  - name: learner-challenge
    description: Learner challenge participation workflows
  - name: learner-daily
    description: Learner daily goal and streak workflows
  - name: learner-ai
    description: Learner AI assistance and feedback workflows
  - name: learner-social
    description: Learner social interactions and community workflows
  - name: learner-reward
    description: Learner reward, badge, and workflows
  - name: learner-profile
    description: Learner profile and preferences workflows
  - name: admin-course
    description: Admin course management capabilities
  - name: admin-practice
    description: Admin practice content management capabilities
  - name: admin-challenge
    description: Admin challenge operations capabilities
  - name: admin-user
    description: Admin user management capabilities
  - name: admin-moderation
    description: Admin moderation and reporting capabilities
  - name: admin-announcement
    description: Admin announcement publishing capabilities
  - name: admin-stats
    description: Admin analytics and reporting capabilities
  - name: admin-config
    description: Admin configuration management capabilities
  - name: internal
    description: Internal-only platform integrations and system workflows
paths:
  /auth/register:
    post:
      tags:
        - auth
      summary: Register a new learner account
      description: >-
        注册新学习者账号，创建 Account、LearnerProfile 与默认 learner 角色授权，返回登录响应。
      operationId: registerLearnerAccount
      x-audience: shared
      x-permission: auth.register
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LearnerRegisterRequest'
      responses:
        '201':
          description: Learner registered and authenticated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/learner/login:
    post:
      tags:
        - auth
      summary: Learner login with device binding
      description: >-
        学习者使用邮箱和密码登录，并绑定当前设备上下文，返回访问令牌、刷新令牌与学习者档案。
      operationId: learnerLogin
      x-audience: shared
      x-permission: auth.learner.login
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LearnerLoginRequest'
      responses:
        '200':
          description: Learner authenticated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/admin/login:
    post:
      tags:
        - auth
      summary: Admin login with device binding
      description: >-
        管理端用户使用邮箱和密码登录，并绑定当前设备上下文，返回访问令牌、刷新令牌与管理档案。
      operationId: adminLogin
      x-audience: shared
      x-permission: auth.admin.login
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin authenticated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh access token
      description: >-
        使用有效刷新令牌续发访问令牌，并返回当前活跃会话与角色上下文。
      operationId: refreshAuthToken
      x-audience: shared
      x-permission: auth.refresh
      x-idempotent: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Access token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/logout:
    post:
      tags:
        - auth
      summary: Logout current session
      description: >-
        根据会话标识注销刷新令牌与设备会话，供 learner 与 admin 共享使用。
      operationId: logoutAuthSession
      x-audience: shared
      x-permission: auth.logout
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/courses:
    get:
      tags:
        - learner-course
      summary: List learner-visible courses
      description: >-
        返回 learner 可见的已发布课程列表。draft 与 archived 课程不得出现在 learner 列表中。
      operationId: listLearnerCourses
      x-audience: learner
      x-permission: learner.course.read
      x-idempotent: true
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/sort_by'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: Learner course list loaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                          - meta
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/LearnerCourseListItem'
                          meta:
                            type: object
                            required:
                              - page
                              - page_size
                              - total
                              - has_more
                            properties:
                              page:
                                type: integer
                                minimum: 1
                              page_size:
                                type: integer
                                minimum: 1
                                maximum: 100
                              total:
                                type: integer
                                minimum: 0
                              has_more:
                                type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/courses/{course_id}:
    get:
      tags:
        - learner-course
      summary: Get learner-visible course detail
      description: >-
        返回 learner 可见的课程详情与章节列表，仅允许读取 published 状态课程及其 published 章节。
      operationId: getLearnerCourseDetail
      x-audience: learner
      x-permission: learner.course.read
      x-idempotent: true
      parameters:
        - name: course_id
          in: path
          required: true
          description: UUID course identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Learner course detail loaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LearnerCourseDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/profile:
    get:
      tags:
        - learner-profile
      summary: Get learner profile and preferences
      description: >-
        返回学习者个人资料与应用内偏好设置，仅包含 learner 可见字段，不下发 admin 配置内容。
      operationId: getLearnerProfile
      x-audience: learner
      x-permission: learner.profile.read
      x-idempotent: true
      responses:
        '200':
          description: Learner profile returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LearnerProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - learner-profile
      summary: Update learner profile and preferences
      description: >-
        更新学习者昵称、头像、简介、每日目标和主题设置，不允许写入后台管理专用配置。
      operationId: updateLearnerProfile
      x-audience: learner
      x-permission: learner.profile.write
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LearnerProfileUpdateInput'
      responses:
        '200':
          description: Learner profile updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LearnerProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/friends:
    get:
      tags:
        - learner-social
      summary: List learner friends
      description: >-
        返回学习者在平台内的好友关系列表，可按状态筛选，仅覆盖站内好友能力。
      operationId: listLearnerFriends
      x-audience: learner
      x-permission: learner.friend.read
      x-idempotent: true
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - name: status
          in: query
          description: Optional friend relation status filter
          required: false
          schema:
            type: string
            enum:
              - pending
              - accepted
              - rejected
              - blocked
      responses:
        '200':
          description: Learner friends returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/LearnerFriendListItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/friends/requests:
    post:
      tags:
        - learner-social
      summary: Send learner friend request
      description: >-
        向另一位学习者发起站内好友申请，不包含站外分享、私信或实时聊天能力。
      operationId: createLearnerFriendRequest
      x-audience: learner
      x-permission: learner.friend.write
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestInput'
      responses:
        '200':
          description: Friend request created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FriendRelation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/friends/requests/{request_id}:
    patch:
      tags:
        - learner-social
      summary: Respond to learner friend request
      description: >-
        接受、拒绝或拉黑收到的好友申请，维持平台内好友关系状态机。
      operationId: updateLearnerFriendRequest
      x-audience: learner
      x-permission: learner.friend.write
      x-idempotent: false
      parameters:
        - name: request_id
          in: path
          description: Friend request identifier
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Learner friend request response payload
              x-audience: learner
              x-permission: learner.friend.write
              x-idempotent: false
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - accepted
                    - rejected
                    - blocked
      responses:
        '200':
          description: Friend request updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FriendRelation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/activities:
    get:
      tags:
        - learner-social
      summary: List learner activity feed
      description: >-
        返回平台内动态流，基于动态可见性规则过滤，仅展示站内学习行为动态。
      operationId: listLearnerActivities
      x-audience: learner
      x-permission: learner.activity.read
      x-idempotent: true
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - name: visibility
          in: query
          description: Optional activity visibility filter
          required: false
          schema:
            type: string
            enum:
              - friends_only
              - public_in_app
              - private
      responses:
        '200':
          description: Learner activity feed returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/LearnerActivityFeedItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/leaderboards:
    get:
      tags:
        - learner-social
      summary: List learner leaderboard rankings
      description: >-
        返回学习者可见的排行榜读模型，服务端基于排行榜快照与奖励真相源派生排行展示字段，客户端不得自行推导关键统计值。
      operationId: listLearnerLeaderboards
      x-audience: learner
      x-permission: learner.leaderboard.read
      x-idempotent: true
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - name: board_type
          in: query
          description: Optional leaderboard type filter
          required: false
          schema:
            type: string
            enum:
              - daily
              - weekly
              - total
        - name: period_key
          in: query
          description: Optional leaderboard period key such as 2026-W19
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Learner leaderboard rankings returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                          - generated_at
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/LearnerRankItem'
                          generated_at:
                            type: string
                            format: date-time

    LearnerChallengeAttemptRequest:
      type: object
      description: Learner challenge attempt submission payload
      x-audience: learner
      x-permission: learner.challenge.write
      x-idempotent: false
      required:
        - stage_results
      properties:
        stage_results:
          type: array
          description: Ordered stage attempt results
          items:
            type: object
            required:
              - stage_id
              - passed
              - score
            properties:
              stage_id:
                type: string
                format: uuid
              passed:
                type: boolean
              score:
                type: integer
                minimum: 0
                maximum: 100
              source_code:
                type: string
                nullable: true
              elapsed_seconds:
                type: integer
                minimum: 0
                nullable: true
    LearnerDailyChallengeSubmitRequest:
      type: object
      description: Learner daily challenge submission payload
      x-audience: learner
      x-permission: learner.daily.write
      x-idempotent: false
      required:
        - source_code
      properties:
        source_code:
          type: string
        elapsed_seconds:
          type: integer
          minimum: 0
          nullable: true
    AdminChallengeUpdateInput:
      type: object
      description: Admin payload for partial challenge updates and state transitions
      x-audience: admin
      x-permission: admin.challenge.write
      x-idempotent: false
      required:
        - content_version
      properties:
        title:
          type: string
          minLength: 1
        summary:
          type: string
        related_course_id:
          type: string
          format: uuid
          nullable: true
        difficulty:
          type: string
          enum:
            - easy
            - medium
            - hard
        reward_xp:
          type: integer
          minimum: 0
        status:
          type: string
          description: Allowed transitions are draft -> published -> archived
          enum:
            - draft
            - published
            - archived
        sort_order:
          type: integer
        content_version:
          type: integer
          minimum: 1
        stages:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              exercise_id:
                type: string
                format: uuid
              order_index:
                type: integer
                minimum: 1
              star_rule_json:
                type: object
                additionalProperties: true
              unlock_rule_json:
                type: object
                additionalProperties: true
              rule_version:
                type: integer
                minimum: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /learner/stats/personal:
    get:
      tags:
        - learner-profile
      summary: Get learner personal stats snapshot
      description: >-
        返回学习者个人统计读模型，聚合学习时长、完成进度、AI 使用与当前排行等服务端派生指标。
      operationId: getLearnerPersonalStats
      x-audience: learner
      x-permission: learner.stats.read
      x-idempotent: true
      parameters:
        - name: board_type
          in: query
          description: Optional board type context for rank projection
          required: false
          schema:
            type: string
            enum:
              - daily
              - weekly
              - total
      responses:
        '200':
          description: Learner personal stats returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LearnerPersonalStats'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /admin/stats/dashboard:
    get:
      tags:
        - admin-stats
      summary: Get admin dashboard stats snapshot
      description: >-
        返回后台看板统计读模型，聚合平台级课程完成率、挑战完成率、日活学习者数与 AI 使用趋势等指标。
      operationId: getAdminDashboardStats
      x-audience: admin
      x-permission: admin.stats.read
      x-idempotent: true
      responses:
        '200':
          description: Admin dashboard stats returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminDashboardStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /admin/stats/courses:
    get:
      tags:
        - admin-stats
      summary: List admin course stats
      description: >-
        返回按课程聚合的统计读模型，供后台查看课程报名、活跃、学习时长与完成情况；关键统计值由服务端统一派生。
      operationId: listAdminCourseStats
      x-audience: admin
      x-permission: admin.stats.read
      x-idempotent: true
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/sort_by'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: Admin course stats returned successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
